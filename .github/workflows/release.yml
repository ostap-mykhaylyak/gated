name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: false
      - name: build
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -trimpath -ldflags "-s -w -X main.version=${GITHUB_REF_NAME}" -o gated ./cmd/gated
      - name: package
        run: |
          BUNDLE=gated-${GITHUB_REF_NAME}-${{ matrix.goos }}-${{ matrix.goarch }}
          mkdir "$BUNDLE"
          # The binary self-provisions on first run: the bundle only
          # ships binary + unit + docs.
          cp gated internal/bootstrap/gated.service README.md LICENSE "$BUNDLE"/
          tar -czf "$BUNDLE.tar.gz" "$BUNDLE"
          sha256sum "$BUNDLE.tar.gz" > "$BUNDLE.tar.gz.sha256"
      - uses: softprops/action-gh-release@v3
        with:
          files: |
            gated-*.tar.gz
            gated-*.tar.gz.sha256
