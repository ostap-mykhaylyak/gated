# gated - global configuration.
#
# This file is never rewritten by the program: /etc/gated may be
# mounted read-only. Virtual hosts live in /etc/gated/vhosts/, one
# YAML file per vhost (those ARE rewritten by the management API, if
# you enable it).
#
# Every field is optional: omitted fields keep their production
# default (the values shown here). Reloaded automatically on change.

# IMPORTANT: if another server (e.g. nginx) already listens on
# 127.0.0.1:80/443 on this host, do NOT use 0.0.0.0 here — 0.0.0.0
# overlaps 127.0.0.1 on the same port and the bind will fail with
# "address already in use". Bind gated to the PUBLIC IP instead
# (e.g. "203.0.113.10:80"), leaving nginx on loopback as the backend.
entrypoints:
  http:
    listen: "0.0.0.0:80"        # public IP when nginx is on 127.0.0.1:80
  https:
    listen: "0.0.0.0:443"       # TCP (HTTP/1.1 + HTTP/2)
    http3: true                 # QUIC on the same UDP port + Alt-Svc header

tls:
  # Conventional certbot directory: certificates are looked up as
  # <letsencrypt_dir>/<host>/fullchain.pem + privkey.pem and hot-swapped
  # on renewal. Per-vhost overrides live in the vhost file.
  letsencrypt_dir: "/etc/letsencrypt/live"
  min_version: "1.2"            # "1.2" or "1.3"

proxy:
  # CIDRs (or single IPs) whose real_ip_header is trusted for client
  # IP resolution. Invalid entries are skipped with a warning.
  trusted_proxies: []           # e.g. ["10.0.0.0/8", "173.245.48.0/20"]
  real_ip_header: "X-Forwarded-For"
  read_header_timeout: "10s"
  backend_timeout: "60s"

compression:
  # Global default, overridable per-vhost. Algorithms in preference
  # order for Accept-Encoding negotiation.
  enabled: true
  algorithms: [zstd, br, gzip]
  min_size: 1024                # bytes below which responses are not compressed

health:
  # Global default for passive backend health checking, overridable
  # per-vhost: a backend is marked down after max_fails consecutive
  # errors and retried after cooldown.
  max_fails: 3
  cooldown: "30s"

geoip:
  # MaxMind GeoIP lookups, consumed by the WAF via the country /
  # continent / asn rule fields (e.g. block traffic from a country).
  # Databases are read from the conventional Ubuntu path and hot-swapped
  # when geoipupdate refreshes them. Disabled by default.
  enabled: false
  country_db: "/usr/share/GeoIP/GeoLite2-Country.mmdb"  # or /var/lib/GeoIP/...
  asn_db: ""                    # optional, e.g. /usr/share/GeoIP/GeoLite2-ASN.mmdb

cache:
  # Shared in-memory response cache. Always allocated; each vhost opts
  # in via its own `cache` section. This only bounds the total memory.
  max_size_bytes: 268435456     # 256 MiB

waf:
  # Web application firewall. Rules live in rules_dir, one group per
  # YAML file (see waf/*.yaml), hot-reloaded. Disabled by default.
  # mode "detect" logs matches without blocking (use it to tune, then
  # switch to "block"). Per-vhost overrides available in the vhost file.
  enabled: false
  rules_dir: "/etc/gated/waf"
  # Folder-based access lists, hot-reloaded. Drop *.ips files (single
  # IP or CIDR, one per line) and *.asn files (one ASN per line, needs
  # geoip.asn_db) into these directories. A whitelisted client bypasses
  # the WAF entirely; a blacklisted one is blocked (whitelist wins).
  allow_dir: "/etc/gated/allow"  # whitelist
  deny_dir: "/etc/gated/deny"    # blacklist
  mode: block                   # block | detect
  max_body_bytes: 131072        # request body inspected up to this size (0 = never)

challenge:
  # Browser-challenge action ("Checking your browser" interstitial).
  # The clearance cookie is HMAC-signed and bound to the client IP.
  #
  # secret: leave empty for a persistent key auto-generated on first
  # run at /var/log/gated/challenge.secret (survives restarts). Set it
  # explicitly only to share clearances across multiple gated hosts.
  secret: ""
  # difficulty: SHA-256 proof-of-work leading zero bits. Higher = more
  # client cost (slows floods) but more latency; the PoW runs via
  # SubtleCrypto and therefore needs HTTPS (gated redirects to HTTPS
  # before challenging). 0 = JS challenge only (works everywhere).
  # 4 is a light production default; raise toward 12-16 under attack.
  difficulty: 4
  clearance_ttl: 30m            # how long a passed challenge lasts

session:
  # Prior-visit marker used by the WAF `session` field. gated sets a
  # signed visit cookie on HTML page loads; rules can then require it
  # on sensitive endpoints (see waf/50-session.yaml). The key is
  # auto-generated and persisted like challenge.secret.
  secret: ""
  ttl: 2h                       # how long a visit marker stays valid

pages:
  # Styled error/challenge pages. Built-in templates are used unless
  # you drop message.html / challenge.html into this directory.
  dir: "/etc/gated/pages"

api:
  # Optional management REST API. Disabled by default; enabling it
  # REQUIRES a token and makes /etc/gated/vhosts writable (see the
  # ReadWritePaths note in the systemd unit).
  enabled: false
  listen: "127.0.0.1:9090"      # loopback or management network, NEVER the public entrypoint
  token: ""                     # bearer token; empty + enabled = fatal error
  tls:                          # required if listen is not loopback
    cert_file: ""
    key_file: ""
