# gated WAF - WooCommerce hardening (starter set).
#
# ENABLED by default; edit or set enabled: false to turn off. Protects the cart/checkout/API surface, which is
# a common target for database-flooding and card-testing bots. Combine
# with waf/50-session.yaml (prior-visit gate) for add-to-cart.

group: woocommerce
description: WooCommerce cart/checkout/API protections.
enabled: true

rules:
  # Store API / AJAX: pace anonymous bursts (bots probing cart/checkout).
  - id: "wc-store-api-ratelimit"
    msg: "WooCommerce store API rate limit"
    severity: medium
    match:
      - field: path
        operator: rx
        transform: [lowercase]
        patterns: ['^/wp-json/wc/store/', '^/\?wc-ajax=']
    rate_limit:
      requests: 30
      per: 1m
      burst: 10

  # add-to-cart hammering without a prior visit is a DB-flood pattern:
  # require the visit session marker (see 50-session.yaml). Here as a
  # rate limit fallback in case the session gate is not enabled.
  - id: "wc-add-to-cart-ratelimit"
    msg: "add-to-cart rate limit"
    match:
      - field: query
        operator: contains
        patterns: ["add-to-cart="]
    rate_limit:
      requests: 15
      per: 1m

  # Checkout: card-testing bots submit the checkout endpoint rapidly.
  - id: "wc-checkout-ratelimit"
    msg: "checkout rate limit"
    severity: high
    match:
      - field: path
        operator: rx
        transform: [lowercase]
        patterns: ['/checkout/', '/\?wc-ajax=checkout']
      - field: method
        operator: eq
        patterns: ["POST"]
    rate_limit:
      requests: 5
      per: 1m

  # Coupon brute forcing via the apply-coupon AJAX action.
  - id: "wc-coupon-bruteforce"
    msg: "coupon brute force"
    action: ban
    match:
      - field: query
        operator: contains
        patterns: ["wc-ajax=apply_coupon"]
    track:
      threshold: 20
      window: 5m
      ban_time: 1h

  # Cart/wishlist state actions (add-to-cart, remove_item, coupons,
  # wishlist...) are GET links that scrapers follow, hammering the DB.
  # They mutate a cart/wishlist, so they can't happen "cold": a request
  # with NO prior visit session is a bot — block it. (Needs the visit
  # session marker; see 50-session.yaml. Raise session.ttl if long-idle
  # carts get blocked, or switch this to action: challenge to be softer.)
  - id: "wc-cart-action-no-session"
    msg: "cart/wishlist action without a prior session"
    severity: medium
    action: block
    status: 403
    match:
      - field: query
        operator: contains
        patterns:
          - "add-to-cart="
          - "remove_item="
          - "undo_item="
          - "add_to_wishlist="
          - "remove_from_wishlist="
          - "apply_coupon="
          - "remove_coupon="
      - field: session
        operator: eq
        patterns: ["none"]

  # The same actions WITH a session: still challenge, to stop bots that
  # persist cookies but don't run JavaScript. block wins over challenge,
  # so a cold request hits the rule above instead.
  - id: "wc-cart-action-challenge"
    msg: "cart/wishlist action - browser check"
    action: challenge
    match:
      - field: query
        operator: contains
        patterns:
          - "add-to-cart="
          - "remove_item="
          - "undo_item="
          - "add_to_wishlist="
          - "remove_from_wishlist="
          - "apply_coupon="
          - "remove_coupon="
